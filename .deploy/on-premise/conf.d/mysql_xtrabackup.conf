job_name: PROJECT-mysql_xtrabackup
type: mysql_xtrabackup
tmp_dir: /var/nxs-backup/dump_tmp
safety_backup: false
deferred_copying: false
sources:
  - name: mysql_xtrabackup
    connect:
      db_host: mysql
      db_port: "3306"
      db_user: root
      db_password: rootP@5s
    excludes:
      - bd_name.table_to_exclude
    gzip: true
    # Path to the MySQL server config (my.cnf). Passed to xtrabackup/mariadb-backup
    # as `--defaults-file` (placed first on the command line, as required) so the
    # tool can locate `datadir` and other server settings when they are not in a
    # default location.
    defaults_file: /etc/mysql/my.cnf
    db_extra_keys: --parallel=4 --lock-ddl-per-table
    prepare_xtrabackup: true
storages_options:
  - storage_name: local
    backup_path: /var/nxs-backup/dump
    retention:
      days: 7
      weeks: 5
      months: 5
